                      {Object.entries(issuesByProject).map(([projId, group]) => (
                        <div key={projId} style={{ marginTop: "12px" }}>
                          <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "6px" }}>
                            <span style={{ fontSize: "14px" }}>{group.icon}</span>
                            <span style={{ fontFamily: "'Space Mono', monospace", fontSize: "10px", letterSpacing: "1.5px", color: "rgba(255,255,255,0.4)", textTransform: "uppercase" }}>{group.name}</span>
                            <span style={{ fontFamily: "'Space Mono', monospace", fontSize: "9px", color: "rgba(255,255,255,0.2)" }}>({group.issues.length})</span>
                          </div>
                          <div style={{ display: "flex", flexDirection: "column", gap: "3px", marginLeft: "22px" }}>
                            {group.issues.map(issue => (
                              <div key={issue.id} style={{
                                display: "flex", alignItems: "center", gap: "12px", padding: "8px 12px",
                                borderRadius: "9px", background: "rgba(255,255,255,0.015)", transition: "background 0.2s",
                              }}
                                onMouseEnter={e => e.currentTarget.style.background = "rgba(255,255,255,0.035)"}
                                onMouseLeave={e => e.currentTarget.style.background = "rgba(255,255,255,0.015)"}
                              >
                                <div onClick={() => toggleIssue(issue.projectId, issue.id)} style={{
                                  width: "20px", height: "20px", borderRadius: "6px", flexShrink: 0, cursor: "pointer",
                                  border: `2px solid ${issuePriorityColors[issue.priority]}`,
                                  background: "transparent", display: "flex", alignItems: "center", justifyContent: "center",
                                  transition: "all 0.2s",
                                }} />
                                <div style={{ flex: 1, minWidth: 0 }}>
                                  <div style={{ fontSize: "13px", fontWeight: "500", color: "#FAFAF7", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{issue.title}</div>
                                  {issue.description && <div style={{ fontSize: "11px", color: "rgba(255,255,255,0.3)", marginTop: "1px", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{issue.description}</div>}
                                </div>
                                {issue.dueDate && <span style={{ fontFamily: "'Space Mono', monospace", fontSize: "10px", color: "rgba(255,255,255,0.3)", flexShrink: 0 }}>{formatDate(issue.dueDate)}</span>}
                                <div style={{
                                  fontFamily: "'Space Mono', monospace", fontSize: "8px", letterSpacing: "1px",
                                  color: issuePriorityColors[issue.priority], textTransform: "uppercase", fontWeight: "700",
                                  background: `${issuePriorityColors[issue.priority]}18`, padding: "2px 7px", borderRadius: "4px", flexShrink: 0,
                                }}>{issuePriorityLabels[issue.priority]}</div>
                              </div>
                            ))}
                          </div>
                        </div>
                      ))}
                      {totalOpenIssueCount === 0 && (
                        <div style={{ padding: "12px 0 4px", fontFamily: "'Space Mono', monospace", fontSize: "10px", color: "rgba(255,255,255,0.2)", fontStyle: "italic" }}>No open issues across projects.</div>
                      )}

                      {/* Archived resolved hot issues */}
                      {archivedIssues.length > 0 && (
                        <div style={{ marginTop: "12px", borderTop: "1px solid rgba(255,255,255,0.04)", paddingTop: "10px" }}>
                          <div style={{ fontFamily: "'Space Mono', monospace", fontSize: "9px", letterSpacing: "2px", color: "rgba(255,255,255,0.2)", textTransform: "uppercase", marginBottom: "6px" }}>
                            Resolved Hot Issues — drops off after 7 days
                          </div>
                          <div style={{ display: "flex", flexDirection: "column", gap: "2px" }}>
                            {archivedIssues.map(issue => {
                              const daysAgo = Math.floor((Date.now() - issue.completedAt) / (1000 * 60 * 60 * 24));
                              return (
                                <div key={issue.id} style={{ display: "flex", alignItems: "center", gap: "10px", padding: "6px 12px", borderRadius: "8px", opacity: 0.5 }}>
                                  <div style={{ width: "18px", height: "18px", borderRadius: "5px", border: "2px solid rgba(74,222,128,0.4)", background: "rgba(74,222,128,0.08)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                                    <span style={{ color: "#4ADE80", fontSize: "10px", fontWeight: "700" }}>✓</span>
                                  </div>
                                  <div style={{ flex: 1, minWidth: 0 }}>
                                    <div style={{ fontSize: "12px", color: "rgba(255,255,255,0.3)", textDecoration: "line-through" }}>{issue.title}</div>
                                    <div style={{ fontSize: "9px", color: "rgba(255,255,255,0.15)", marginTop: "1px" }}>{issue.projectName}</div>
                                  </div>
                                  <span style={{ fontFamily: "'Space Mono', monospace", fontSize: "9px", color: "rgba(255,255,255,0.15)" }}>{daysAgo === 0 ? "today" : `${daysAgo}d ago`}</span>
                                  <button onClick={() => setArchivedIssues(prev => prev.filter(i => i.id !== issue.id))} style={{ background: "none", border: "none", cursor: "pointer", fontSize: "10px", color: "rgba(255,255,255,0.12)", padding: "2px", transition: "color 0.2s" }}
                                    onMouseEnter={e => e.currentTarget.style.color = "#F87171"}
                                    onMouseLeave={e => e.currentTarget.style.color = "rgba(255,255,255,0.12)"}
                                  >✕</button>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })()}

        {/* QUICK LAUNCH */}
        <div style={{
          display: "flex", gap: "8px", marginBottom: "24px", flexWrap: "wrap",
          opacity: loaded ? 1 : 0, transform: loaded ? "translateY(0)" : "translateY(20px)",
          transition: "all 0.8s cubic-bezier(0.4,0,0.2,1) 0.1s",
        }}>
          {SHORTCUTS.map((s, i) => (
            <button key={i} onClick={() => s.action === "team" ? setTeamPanelOpen(true) : s.url && window.open(s.url, "_blank")} style={{
              flex: "1 1 auto", minWidth: "72px", maxWidth: "110px",
              background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.06)",
              borderRadius: "12px", padding: "12px 6px", color: "#E8E6E1", cursor: "pointer",
              display: "flex", flexDirection: "column", alignItems: "center", gap: "5px", transition: "all 0.3s ease",
            }}
              onMouseEnter={e => { e.currentTarget.style.background = "rgba(255,255,255,0.07)"; e.currentTarget.style.borderColor = s.color + "44"; e.currentTarget.style.transform = "translateY(-2px)"; }}
              onMouseLeave={e => { e.currentTarget.style.background = "rgba(255,255,255,0.03)"; e.currentTarget.style.borderColor = "rgba(255,255,255,0.06)"; e.currentTarget.style.transform = "translateY(0)"; }}
            >
              <span style={{ fontSize: "18px", color: s.color }}>{s.icon}</span>
              <span style={{ fontSize: "9px", fontWeight: "600", letterSpacing: "0.8px", textTransform: "uppercase" }}>{s.label}</span>
            </button>
          ))}
        </div>

        {/* MAIN GRID */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 380px", gap: "24px" }}>
          {/* LEFT: Projects */}
          <div style={{
            opacity: loaded ? 1 : 0, transform: loaded ? "translateY(0)" : "translateY(20px)",
            transition: "all 0.8s cubic-bezier(0.4,0,0.2,1) 0.2s",
          }}>
            <div style={{ fontFamily: "'Space Mono', monospace", fontSize: "11px", letterSpacing: "3px", color: "rgba(255,255,255,0.35)", textTransform: "uppercase", marginBottom: "14px" }}>
              Active Projects ({projects.length})
            </div>
            <div style={{
              display: "grid",
              gridTemplateColumns: projects.length > 4 ? "repeat(4, 1fr)" : projects.length > 2 ? "repeat(3, 1fr)" : projects.length === 2 ? "repeat(2, 1fr)" : "1fr",
              maxWidth: projects.length <= 2 ? "320px" : "none",
              gap: "10px", marginBottom: "16px",
            }}>
              {projects.map((project) => {
                const isSelected = selectedProject === project.id;
                const isNew = justCreated === project.id;
                const daysTo = daysUntil(project.nextMilestoneDate);
                const isDragOver = dragOverProjectId === project.id && dragProjectId !== project.id;
                return (
                  <div key={project.id}
                    draggable={true}
                    onDragStart={(e) => {
                      setDragProjectId(project.id);
                      e.dataTransfer.effectAllowed = "move";
                      setTimeout(() => { try { e.currentTarget.style.opacity = "0.4"; } catch(_) {} }, 0);
                    }}
                    onDragEnd={(e) => {
                      try { e.currentTarget.style.opacity = "1"; } catch(_) {}
                      setDragProjectId(null);
                      setDragOverProjectId(null);
                    }}
                    onDragOver={(e) => {
                      e.preventDefault();
                      e.dataTransfer.dropEffect = "move";
                      if (project.id !== dragProjectId) setDragOverProjectId(project.id);
                    }}
                    onDragLeave={() => setDragOverProjectId(null)}
                    onDrop={(e) => {
                      e.preventDefault();
                      if (dragProjectId && project.id !== dragProjectId) {
                        setProjects(prev => {
                          const arr = [...prev];
                          const fromIdx = arr.findIndex(p => p.id === dragProjectId);
                          const toIdx = arr.findIndex(p => p.id === project.id);
                          const [moved] = arr.splice(fromIdx, 1);
                          arr.splice(toIdx, 0, moved);
                          return arr;
                        });
                      }
                      setDragProjectId(null);
                      setDragOverProjectId(null);
                    }}
                    onClick={() => setSelectedProject(isSelected ? null : project.id)} style={{
                    background: isNew ? "rgba(74,222,128,0.1)" : isSelected ? "rgba(232,200,114,0.1)" : "rgba(255,255,255,0.025)",
                    border: `1px solid ${isDragOver ? "rgba(114,184,232,0.55)" : isNew ? "rgba(74,222,128,0.35)" : isSelected ? "rgba(232,200,114,0.3)" : "rgba(255,255,255,0.05)"}`,
                    borderRadius: "14px", padding: "14px 12px", cursor: "grab",
                    transition: "all 0.35s cubic-bezier(0.4,0,0.2,1)", position: "relative", overflow: "hidden",
                    transform: isDragOver ? "scale(1.03)" : "none",
                    boxShadow: isDragOver ? "0 0 0 2px rgba(114,184,232,0.3)" : "none",
                  }}
                    onMouseEnter={e => { if (!isSelected) { e.currentTarget.style.background = "rgba(255,255,255,0.045)"; e.currentTarget.style.borderColor = "rgba(255,255,255,0.1)"; e.currentTarget.style.transform = "translateY(-2px)"; }}}
                    onMouseLeave={e => { if (!isSelected) { e.currentTarget.style.background = "rgba(255,255,255,0.025)"; e.currentTarget.style.borderColor = "rgba(255,255,255,0.05)"; e.currentTarget.style.transform = "translateY(0)"; }}}
                  >
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "8px" }}>
                      <div style={{ fontSize: "20px" }}>{project.icon}</div>
                      <div style={{ display: "flex", alignItems: "center", gap: "5px" }}>
                        {(project.issues || []).filter(i => !i.done).length > 0 && (
                          <div style={{
                            fontFamily: "'Space Mono', monospace", fontSize: "8px", fontWeight: "700",
                            color: (project.issues || []).some(i => !i.done && i.priority === "hot") ? "#F87171" : "#FBBF24",
                            background: (project.issues || []).some(i => !i.done && i.priority === "hot") ? "rgba(248,113,113,0.12)" : "rgba(251,191,36,0.1)",
                            borderRadius: "4px", padding: "1px 5px", lineHeight: "1.4",
                          }}>{(project.issues || []).filter(i => !i.done).length}</div>
                        )}
                        <div style={{ width: "8px", height: "8px", borderRadius: "50%", background: statusColors[project.status], boxShadow: `0 0 6px ${statusColors[project.status]}44` }} />
                      </div>
                    </div>
                    <div style={{ fontSize: "12px", fontWeight: "600", color: "#FAFAF7", marginBottom: "2px", lineHeight: "1.3", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{project.name}</div>
                    <div style={{ fontFamily: "'Space Mono', monospace", fontSize: "8px", letterSpacing: "1px", color: "rgba(255,255,255,0.3)", textTransform: "uppercase", marginBottom: "10px" }}>
                      {project.phase === "Construction Admin"
                        ? <span style={{ color: "#4ADE80", background: "rgba(74,222,128,0.1)", border: "1px solid rgba(74,222,128,0.2)", borderRadius: "4px", padding: "1px 5px" }}>CA</span>
                        : project.phase}
                    </div>
                    <MiniProgressBar progress={project.progress} color={statusColors[project.status]} />
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: "6px" }}>
                      <span style={{ fontFamily: "'Space Mono', monospace", fontSize: "10px", color: "rgba(255,255,255,0.4)" }}>{project.progress}%</span>
                      {daysTo <= 21 && <span style={{ fontFamily: "'Space Mono', monospace", fontSize: "9px", color: daysTo <= 7 ? "#FBBF24" : "rgba(255,255,255,0.3)" }}>{daysTo}d</span>}
                    </div>
                  </div>
                );
              })}
            </div>

            {selectedProjectData && (
              <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(232,200,114,0.12)", borderRadius: "16px", padding: "24px", animation: "fadeSlide 0.4s ease" }}>
                <style>{`@keyframes fadeSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }`}</style>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "16px" }}>
                  <div>
                    <div style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "4px" }}>
                      <span style={{ fontSize: "20px" }}>{selectedProjectData.icon}</span>
                      <h3 style={{ margin: 0, fontSize: "20px", fontWeight: "600", color: "#FAFAF7" }}>{selectedProjectData.name}</h3>
                    </div>
                    <div style={{ fontSize: "13px", color: "rgba(255,255,255,0.4)", marginLeft: "30px" }}>{selectedProjectData.client}</div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
                    {confirmDeleteId === selectedProjectData.id ? (
                      <>
                        <span style={{ fontSize: "11px", color: "#F87171", fontFamily: "'Space Mono', monospace" }}>Remove project?</span>
                        <button onClick={() => {
                          setProjects(prev => prev.filter(p => p.id !== selectedProjectData.id));
                          setSelectedProject(null);
                          setConfirmDeleteId(null);
                        }} style={{
                          background: "rgba(248,113,113,0.18)", border: "1px solid rgba(248,113,113,0.4)",
                          borderRadius: "7px", padding: "5px 12px", cursor: "pointer",
                          fontFamily: "'Space Mono', monospace", fontSize: "9px", letterSpacing: "1px",
                          color: "#F87171", textTransform: "uppercase", fontWeight: "700",
                        }}>Yes, Remove</button>
                        <button onClick={() => setConfirmDeleteId(null)} style={{
                          background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)",
                          borderRadius: "7px", padding: "5px 12px", cursor: "pointer",
                          fontFamily: "'Space Mono', monospace", fontSize: "9px", letterSpacing: "1px",
                          color: "rgba(255,255,255,0.4)", textTransform: "uppercase",
                        }}>Cancel</button>
                      </>
                    ) : (
                      <button onClick={() => setConfirmDeleteId(selectedProjectData.id)} style={{
                        background: "transparent", border: "1px solid rgba(248,113,113,0.15)",
                        borderRadius: "7px", padding: "5px 10px", cursor: "pointer",
                        fontFamily: "'Space Mono', monospace", fontSize: "9px", letterSpacing: "1px",
                        color: "rgba(248,113,113,0.4)", textTransform: "uppercase", transition: "all 0.2s",
                      }}
                        onMouseEnter={e => { e.currentTarget.style.borderColor = "rgba(248,113,113,0.4)"; e.currentTarget.style.color = "#F87171"; e.currentTarget.style.background = "rgba(248,113,113,0.06)"; }}
                        onMouseLeave={e => { e.currentTarget.style.borderColor = "rgba(248,113,113,0.15)"; e.currentTarget.style.color = "rgba(248,113,113,0.4)"; e.currentTarget.style.background = "transparent"; }}
                      >Remove</button>
                    )}
                    <ProgressRing progress={selectedProjectData.progress} color={statusColors[selectedProjectData.status]} />
                  </div>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "16px", marginBottom: "20px", paddingBottom: "20px", borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
                  <div>
                    <div style={{ fontFamily: "'Space Mono', monospace", fontSize: "9px", letterSpacing: "2px", color: "rgba(255,255,255,0.3)", textTransform: "uppercase", marginBottom: "6px" }}>Phase</div>
                    {selectedProjectData.phase === "Construction Admin" ? (
                      <div style={{ fontSize: "14px", fontWeight: "500", display: "flex", alignItems: "center", gap: "8px" }}>
                        <span style={{ color: "#4ADE80", background: "rgba(74,222,128,0.1)", border: "1px solid rgba(74,222,128,0.25)", borderRadius: "6px", padding: "2px 8px", fontSize: "12px", fontFamily: "'Space Mono', monospace", letterSpacing: "1px" }}>CA</span>
                        <span style={{ fontSize: "12px", color: "rgba(255,255,255,0.5)" }}>Construction Admin</span>
                      </div>
                    ) : (
                      <div style={{ display: "flex", gap: "4px", flexWrap: "wrap" }}>
                        {[
                          { label: "Prog", value: "Programming" },
                          { label: "SD", value: "Schematic Design" },
                          { label: "DD", value: "Design Development" },
                          { label: "CD", value: "Construction Documents" },
                        ].map(ph => {
                          const isActive = selectedProjectData.phase === ph.value;
                          return (
                            <button key={ph.value} onClick={() => updateProjectField(selectedProjectData.id, { phase: ph.value })} style={{
                              background: isActive ? "rgba(232,200,114,0.18)" : "rgba(255,255,255,0.04)",
                              border: `1px solid ${isActive ? "rgba(232,200,114,0.45)" : "rgba(255,255,255,0.08)"}`,
                              borderRadius: "6px", padding: "3px 8px", cursor: "pointer",
                              fontFamily: "'Space Mono', monospace", fontSize: "9px", letterSpacing: "1px",
                              color: isActive ? "#E8C872" : "rgba(255,255,255,0.35)",
                              fontWeight: isActive ? "700" : "400",
                              transition: "all 0.15s",
                            }}
                              onMouseEnter={e => { if (!isActive) { e.currentTarget.style.background = "rgba(232,200,114,0.08)"; e.currentTarget.style.color = "rgba(232,200,114,0.7)"; e.currentTarget.style.borderColor = "rgba(232,200,114,0.2)"; } }}
                              onMouseLeave={e => { if (!isActive) { e.currentTarget.style.background = "rgba(255,255,255,0.04)"; e.currentTarget.style.color = "rgba(255,255,255,0.35)"; e.currentTarget.style.borderColor = "rgba(255,255,255,0.08)"; } }}
                            >{ph.label}</button>
                          );
                        })}
                      </div>
                    )}
                  </div>
                  <div>
                    <div style={{ fontFamily: "'Space Mono', monospace", fontSize: "9px", letterSpacing: "2px", color: "rgba(255,255,255,0.3)", textTransform: "uppercase", marginBottom: "4px" }}>Next Milestone</div>
                    <div style={{ fontSize: "14px", fontWeight: "500" }}>{selectedProjectData.nextMilestone}</div>
                    <div style={{ fontFamily: "'Space Mono', monospace", fontSize: "11px", color: "rgba(255,255,255,0.35)", marginTop: "2px" }}>{formatDate(selectedProjectData.nextMilestoneDate)} ({daysUntil(selectedProjectData.nextMilestoneDate)}d)</div>
                  </div>
                  <div>
                    <div style={{ fontFamily: "'Space Mono', monospace", fontSize: "9px", letterSpacing: "2px", color: "rgba(255,255,255,0.3)", textTransform: "uppercase", marginBottom: "4px" }}>Recent</div>
                    <div style={{ fontSize: "13px", color: "rgba(255,255,255,0.5)", fontStyle: "italic" }}>{selectedProjectData.recentActivity}</div>
                  </div>
                </div>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "12px" }}>
                  <div style={{ fontFamily: "'Space Mono', monospace", fontSize: "9px", letterSpacing: "2px", color: "rgba(255,255,255,0.3)", textTransform: "uppercase" }}>Deliverables</div>
                  <button
                    onClick={() => {
                      if (calSyncProjectId === selectedProjectData.id && calSyncSuggestions.some(s => !s.accepted && !s.declined)) {
                        setCalSyncProjectId(null); setCalSyncSuggestions([]);
                      } else {
                        fetchProjectCalendarEvents(selectedProjectData);
                      }
                    }}
                    disabled={calSyncLoading && calSyncProjectId === selectedProjectData.id}
                    style={{
                      display: "flex", alignItems: "center", gap: "5px",
                      background: "rgba(114,184,232,0.06)", border: "1px solid rgba(114,184,232,0.18)",
                      borderRadius: "7px", padding: "4px 10px", cursor: "pointer", transition: "all 0.2s",
                      fontFamily: "'Space Mono', monospace", fontSize: "9px", letterSpacing: "1px",
                      color: "rgba(114,184,232,0.7)", textTransform: "uppercase",
                      opacity: (calSyncLoading && calSyncProjectId !== selectedProjectData.id) ? 0.4 : 1,
                    }}
                    onMouseEnter={e => { e.currentTarget.style.background = "rgba(114,184,232,0.12)"; e.currentTarget.style.borderColor = "rgba(114,184,232,0.35)"; e.currentTarget.style.color = "#72B8E8"; }}
                    onMouseLeave={e => { e.currentTarget.style.background = "rgba(114,184,232,0.06)"; e.currentTarget.style.borderColor = "rgba(114,184,232,0.18)"; e.currentTarget.style.color = "rgba(114,184,232,0.7)"; }}
                  >
                    {calSyncLoading && calSyncProjectId === selectedProjectData.id
                      ? <><div style={{ width: "6px", height: "6px", borderRadius: "50%", background: "#72B8E8", animation: "pulse 1.2s ease-in-out infinite" }} /> Scanning...</>
                      : <span>↺ Sync Cal</span>
                    }
                  </button>
                </div>

                {/* Calendar Sync Suggestions */}
                {calSyncProjectId === selectedProjectData.id && !calSyncLoading && (
                  <div style={{ marginBottom: "14px" }}>
                    {calSyncSuggestions.filter(s => !s.accepted && !s.declined).length > 0 ? (
                      <div style={{ background: "rgba(114,184,232,0.04)", border: "1px solid rgba(114,184,232,0.15)", borderRadius: "12px", padding: "12px 14px", marginBottom: "10px" }}>
                        <div style={{ fontFamily: "'Space Mono', monospace", fontSize: "9px", letterSpacing: "1.5px", color: "#72B8E8", textTransform: "uppercase", marginBottom: "10px" }}>
                          Found {calSyncSuggestions.filter(s => !s.accepted && !s.declined).length} calendar event{calSyncSuggestions.filter(s => !s.accepted && !s.declined).length !== 1 ? "s" : ""} — add to deliverables?
                        </div>
                        <div style={{ display: "flex", flexDirection: "column", gap: "6px" }}>
                          {calSyncSuggestions.filter(s => !s.accepted && !s.declined).map(s => (
                            <div key={s.id} style={{ display: "flex", alignItems: "center", gap: "10px", padding: "8px 10px", background: "rgba(255,255,255,0.02)", borderRadius: "8px", border: "1px solid rgba(255,255,255,0.05)" }}>
                              <div style={{ flex: 1, minWidth: 0 }}>
                                <div style={{ fontSize: "12px", fontWeight: "500", color: "#FAFAF7", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{s.title}</div>
                                <div style={{ display: "flex", gap: "8px", marginTop: "2px", alignItems: "center" }}>
                                  <span style={{ fontFamily: "'Space Mono', monospace", fontSize: "10px", color: "rgba(255,255,255,0.35)" }}>{formatDate(s.date)}</span>

                          </div>
                          {issue.dueDate && (
                            <span style={{ fontFamily: "'Space Mono', monospace", fontSize: "10px", color: daysUntil(issue.dueDate) < 0 ? "#F87171" : daysUntil(issue.dueDate) <= 3 ? "#FBBF24" : "rgba(255,255,255,0.3)", flexShrink: 0 }}>
                              {formatDate(issue.dueDate)}
                            </span>
                          )}
                          <div style={{
                            fontFamily: "'Space Mono', monospace", fontSize: "8px", letterSpacing: "1px",
                            color: issuePriorityColors[issue.priority], textTransform: "uppercase", fontWeight: "700",
                            background: `${issuePriorityColors[issue.priority]}15`, padding: "2px 7px", borderRadius: "4px", flexShrink: 0,
                          }}>{issue.priority === "hot" ? "🔥 HOT" : issuePriorityLabels[issue.priority]}</div>
                          <div data-issue-actions="true" style={{ display: "flex", gap: "4px", opacity: 0, transition: "opacity 0.2s", flexShrink: 0 }}>
                            <button onClick={() => removeIssue(selectedProjectData.id, issue.id)} title="Remove issue" style={{
                              background: "none", border: "1px solid rgba(255,255,255,0.06)",
                              borderRadius: "5px", padding: "2px 6px", cursor: "pointer", fontSize: "10px",
                              color: "rgba(255,255,255,0.25)", transition: "all 0.2s",
                            }}
                              onMouseEnter={e => { e.currentTarget.style.color = "#F87171"; e.currentTarget.style.borderColor = "rgba(248,113,113,0.3)"; }}
                              onMouseLeave={e => { e.currentTarget.style.color = "rgba(255,255,255,0.25)"; e.currentTarget.style.borderColor = "rgba(255,255,255,0.06)"; }}
                            >✕</button>
                          </div>
                        </div>
                      ))}
                    {/* Completed non-hot issues (done in place) */}
                    {(selectedProjectData.issues || []).filter(i => i.done).map(issue => (
                      <div key={issue.id} style={{
                        display: "flex", alignItems: "center", gap: "12px", padding: "7px 10px",
                        borderRadius: "8px", opacity: 0.4,
                      }}>
                        <div onClick={() => toggleIssue(selectedProjectData.id, issue.id)} style={{
                          width: "20px", height: "20px", borderRadius: "6px", flexShrink: 0, cursor: "pointer",
                          border: "2px solid rgba(74,222,128,0.5)", background: "rgba(74,222,128,0.1)",
                          display: "flex", alignItems: "center", justifyContent: "center",
                        }}>
                          <span style={{ color: "#4ADE80", fontSize: "11px", fontWeight: "700" }}>✓</span>
                        </div>
                        <div style={{ flex: 1, fontSize: "12px", color: "rgba(255,255,255,0.3)", textDecoration: "line-through" }}>{issue.title}</div>
                        <button onClick={() => removeIssue(selectedProjectData.id, issue.id)} style={{
                          background: "none", border: "none", cursor: "pointer", fontSize: "10px",
                          color: "rgba(255,255,255,0.12)", padding: "2px", transition: "color 0.2s",
                        }}
                          onMouseEnter={e => e.currentTarget.style.color = "#F87171"}
                          onMouseLeave={e => e.currentTarget.style.color = "rgba(255,255,255,0.12)"}
                        >✕</button>
                      </div>
                    ))}
                  </div>
                  {(selectedProjectData.issues || []).length === 0 && addingIssueForProject !== selectedProjectData.id && (
                    <div style={{ fontFamily: "'Space Mono', monospace", fontSize: "10px", color: "rgba(255,255,255,0.18)", fontStyle: "italic", padding: "4px 0" }}>
                      No issues — use + Add Issue to track problems, coordination items, or blockers.
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>

          {/* RIGHT: Calendar & Events */}
          <div style={{
            display: "flex", flexDirection: "column", gap: "18px",
            opacity: loaded ? 1 : 0, transform: loaded ? "translateY(0)" : "translateY(20px)",
            transition: "all 0.8s cubic-bezier(0.4,0,0.2,1) 0.35s",
          }}>
            <div style={{ background: "rgba(255,255,255,0.025)", border: "1px solid rgba(255,255,255,0.05)", borderRadius: "16px", padding: "18px" }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "14px" }}>
                <div style={{ fontFamily: "'Space Mono', monospace", fontSize: "11px", letterSpacing: "3px", color: "rgba(255,255,255,0.35)", textTransform: "uppercase" }}>This Week</div>
                <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
                  {calendarLoading && (
                    <div style={{ fontFamily: "'Space Mono', monospace", fontSize: "9px", letterSpacing: "1px", color: "rgba(114,184,232,0.6)", display: "flex", alignItems: "center", gap: "5px" }}>
                      <div style={{ width: "6px", height: "6px", borderRadius: "50%", background: "#72B8E8", animation: "pulse 1.2s ease-in-out infinite" }} />
                      Syncing
                    </div>
                  )}
                  {!calendarLoading && calendarLastFetched && (
                    <div style={{ fontFamily: "'Space Mono', monospace", fontSize: "9px", letterSpacing: "1px", color: "rgba(74,222,128,0.5)" }}>
                      ✓ Live
                    </div>
                  )}
                  {calendarError && !calendarLoading && (
                    <div style={{ fontFamily: "'Space Mono', monospace", fontSize: "9px", letterSpacing: "1px", color: "rgba(251,191,36,0.5)" }} title={calendarError}>
                      ⚠ Cached
                    </div>
                  )}
                  <button onClick={fetchCalendarEvents} disabled={calendarLoading} title="Refresh calendar" style={{
                    background: "none", border: "1px solid rgba(255,255,255,0.06)", borderRadius: "6px",
                    padding: "3px 8px", cursor: calendarLoading ? "not-allowed" : "pointer",
                    fontFamily: "'Space Mono', monospace", fontSize: "9px", color: "rgba(255,255,255,0.25)",
                    opacity: calendarLoading ? 0.4 : 1, transition: "all 0.2s",
                  }}
                    onMouseEnter={e => { if (!calendarLoading) { e.currentTarget.style.color = "#72B8E8"; e.currentTarget.style.borderColor = "rgba(114,184,232,0.3)"; }}}
                    onMouseLeave={e => { e.currentTarget.style.color = "rgba(255,255,255,0.25)"; e.currentTarget.style.borderColor = "rgba(255,255,255,0.06)"; }}
                  >↻</button>
                </div>
              </div>
              <style>{`@keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }`}</style>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: "4px" }}>
                {weekDates.map((date, i) => {
                  const dateStr = date.toISOString().split("T")[0];
                  const isToday = dateStr === todayStr;
                  const hasEvent = allCalendarEvents.some(e => e.date === dateStr);
                  return (
                    <div key={i} style={{ textAlign: "center", padding: "8px 4px", borderRadius: "10px", background: isToday ? "rgba(232,200,114,0.12)" : "transparent", border: isToday ? "1px solid rgba(232,200,114,0.25)" : "1px solid transparent" }}>
                      <div style={{ fontFamily: "'Space Mono', monospace", fontSize: "9px", letterSpacing: "1px", color: isToday ? "#E8C872" : "rgba(255,255,255,0.3)", marginBottom: "4px" }}>{weekDays[i]}</div>
                      <div style={{ fontSize: "16px", fontWeight: isToday ? "700" : "400", color: isToday ? "#FAFAF7" : "rgba(255,255,255,0.5)" }}>{date.getDate()}</div>
                      {hasEvent && <div style={{ width: "4px", height: "4px", borderRadius: "50%", background: "#E8C872", margin: "4px auto 0" }} />}
                    </div>
                  );
                })}
              </div>
            </div>
            <div style={{ background: "rgba(255,255,255,0.025)", border: "1px solid rgba(255,255,255,0.05)", borderRadius: "16px", padding: "18px", flex: 1 }}>
              <div style={{ fontFamily: "'Space Mono', monospace", fontSize: "11px", letterSpacing: "3px", color: "rgba(255,255,255,0.35)", textTransform: "uppercase", marginBottom: "14px" }}>Upcoming</div>
              <div style={{ display: "flex", flexDirection: "column", gap: "2px" }}>
                {upcomingEvents.map((event, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: "12px", padding: "10px", borderRadius: "10px", transition: "background 0.2s", cursor: "pointer" }}
                    onMouseEnter={e => e.currentTarget.style.background = "rgba(255,255,255,0.03)"}
                    onMouseLeave={e => e.currentTarget.style.background = "transparent"}
                  >
                    <div style={{ width: "3px", height: "32px", borderRadius: "2px", background: eventTypeColors[event.type], flexShrink: 0 }} />
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
                        <div style={{ fontSize: "13px", fontWeight: "500", color: "#FAFAF7", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{event.title}</div>
                        {event.fromProject && <div style={{ flexShrink: 0, fontFamily: "'Space Mono', monospace", fontSize: "8px", letterSpacing: "1px", color: "#E8C872", background: "rgba(232,200,114,0.1)", border: "1px solid rgba(232,200,114,0.2)", borderRadius: "4px", padding: "1px 5px", textTransform: "uppercase" }}>CD</div>}
                      </div>
                      <div style={{ fontSize: "11px", color: "rgba(255,255,255,0.35)", marginTop: "1px" }}>{event.fromProject ? "Deliverable" : event.time}</div>
                    </div>
                    <div style={{ fontFamily: "'Space Mono', monospace", fontSize: "11px", color: "rgba(255,255,255,0.3)", flexShrink: 0 }}>{formatDate(event.date)}</div>
                  </div>
                ))}
              </div>
            </div>
            <div style={{
              background: "linear-gradient(135deg, rgba(232,200,114,0.08), rgba(232,200,114,0.02))",
              border: "1px solid rgba(232,200,114,0.15)", borderRadius: "16px", padding: "18px",
              cursor: "pointer", transition: "all 0.3s ease",
            }}
              onClick={() => setWizardOpen(true)}
              onMouseEnter={e => { e.currentTarget.style.borderColor = "rgba(232,200,114,0.3)"; e.currentTarget.style.transform = "translateY(-2px)"; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = "rgba(232,200,114,0.15)"; e.currentTarget.style.transform = "translateY(0)"; }}
            >
              <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
                <div style={{ width: "38px", height: "38px", borderRadius: "12px", background: "rgba(232,200,114,0.15)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "20px", color: "#E8C872" }}>+</div>
                <div>
                  <div style={{ fontSize: "14px", fontWeight: "600", color: "#E8C872" }}>New Project Setup</div>
                  <div style={{ fontSize: "12px", color: "rgba(255,255,255,0.4)", marginTop: "2px" }}>Guided workflow: CDs → Consultants → QA/QC → Notifications</div>
                </div>
              </div>
            </div>
          </div>
        </div>

        {/* ═══════ ITALIAN WIDGET — BOTTOM ═══════ */}
        <div style={{
          marginTop: "28px",
          opacity: loaded ? 1 : 0, transform: loaded ? "translateY(0)" : "translateY(20px)",
          transition: "all 0.8s cubic-bezier(0.4,0,0.2,1) 0.45s",
        }}>
          <ItalianWidget />
        </div>

      </div>

      {/* NEW PROJECT WIZARD */}
      <NewProjectWizard open={wizardOpen} onClose={() => setWizardOpen(false)} onComplete={handleNewProject} team={team} onUpdateTeam={setTeam} />
      <DirectoryPanel open={teamPanelOpen} onClose={() => setTeamPanelOpen(false)} team={team} onUpdateTeam={setTeam} consultants={consultants} onUpdateConsultants={setConsultants} />

      {/* SUCCESS TOAST */}
      {justCreated && (
        <div style={{
          position: "fixed", bottom: "28px", left: "50%", transform: "translateX(-50%)",
          background: "rgba(15,17,23,0.95)", border: "1px solid rgba(74,222,128,0.3)",
          borderRadius: "14px", padding: "14px 24px", zIndex: 2000,
          display: "flex", alignItems: "center", gap: "12px",
          boxShadow: "0 8px 32px rgba(0,0,0,0.4)", animation: "toastIn 0.4s ease",
        }}>
          <style>{`@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }`}</style>
          <div style={{ width: "28px", height: "28px", borderRadius: "50%", background: "rgba(74,222,128,0.15)", display: "flex", alignItems: "center", justifyContent: "center" }}>
            <span style={{ color: "#4ADE80", fontSize: "14px", fontWeight: "700" }}>✓</span>
          </div>
          <div>
            <div style={{ fontSize: "14px", fontWeight: "600", color: "#FAFAF7" }}>Project Created</div>
            <div style={{ fontSize: "12px", color: "rgba(255,255,255,0.4)" }}>Added to your active projects</div>
          </div>
        </div>
      )}

    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><Dashboard /></ErrorBoundary>);
  </script>
  <script>
    // Global error handler for uncaught issues
    window.onerror = function(msg, url, line, col, error) {
      console.error("Global error:", msg, "at line", line);
      var rootEl = document.getElementById('root');
      if (rootEl && rootEl.innerHTML.indexOf('LOADING') > -1) {
        rootEl.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#F87171;font-family:monospace;font-size:13px;gap:12px;padding:40px;text-align:center;background:#0B0D12;"><div style="font-size:24px;">⚠</div><div>Script error at line ' + line + '</div><div style="color:rgba(255,255,255,0.3);font-size:11px;max-width:500px;">' + msg + '</div><div style="margin-top:8px;"><button onclick="location.reload()" style="background:rgba(248,113,113,0.12);border:1px solid rgba(248,113,113,0.3);border-radius:8px;padding:8px 20px;color:#F87171;cursor:pointer;font-size:12px;">Reload</button></div></div>';
      }
    };
  </script>
</body>
</html>
