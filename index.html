// ═══════ ERROR BOUNDARY ═══════
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }
  componentDidCatch(error, info) {
    console.error("RDG Command Center error:", error, info);
  }
  render() {
    if (this.state.hasError) {
      return React.createElement("div", {
        style: { display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "100vh", color: "#F87171", fontFamily: "monospace", fontSize: "14px", gap: "16px", padding: "40px", textAlign: "center", background: "#0B0D12" }
      },
        React.createElement("div", { style: { fontSize: "28px" } }, "⚠"),
        React.createElement("div", { style: { fontSize: "16px", fontWeight: "600" } }, "Something went wrong"),
        React.createElement("div", { style: { color: "rgba(255,255,255,0.35)", fontSize: "12px", maxWidth: "500px", lineHeight: "1.6" } }, String(this.state.error?.message || this.state.error || "Unknown error")),
        React.createElement("button", {
          onClick: () => { this.setState({ hasError: false, error: null }); },
          style: { marginTop: "8px", background: "rgba(248,113,113,0.12)", border: "1px solid rgba(248,113,113,0.3)", borderRadius: "8px", padding: "8px 20px", color: "#F87171", cursor: "pointer", fontSize: "12px", letterSpacing: "1px" }
        }, "Try Again")
      );
    }
    return this.props.children;
  }
}

function getQuizForSession() {
  const type = QUIZ_TYPES[Math.floor(Math.random() * QUIZ_TYPES.length)];
  if (type === "translate_to_english") {
    const item = TRANSLATE_TO_ENGLISH[Math.floor(Math.random() * TRANSLATE_TO_ENGLISH.length)];
    return { type, ...item };
  } else if (type === "translate_to_italian") {
    const item = TRANSLATE_TO_ITALIAN[Math.floor(Math.random() * TRANSLATE_TO_ITALIAN.length)];
    return { type, ...item };
  } else if (type === "word_of_day") {
    const item = WORDS_OF_DAY[Math.floor(Math.random() * WORDS_OF_DAY.length)];
    return { type, ...item };
  } else {
    const item = GRAMMAR_TIPS[Math.floor(Math.random() * GRAMMAR_TIPS.length)];
    return { type, ...item };
  }
}

function daysUntil(dateStr) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const target = new Date(dateStr + "T00:00:00");
  return Math.ceil((target - today) / (1000 * 60 * 60 * 24));
}

function formatDate(dateStr) {
  return new Date(dateStr + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" });
}

// Extract keywords from a project name to match against calendar event titles
function getProjectKeywords(project) {
  const name = project.name.toLowerCase();
  const client = (project.client || "").toLowerCase();
  const keywords = new Set();
  // Always use first meaningful word of project name
  const words = name.split(/[\s\-\/]+/).filter(w => w.length > 2);
  words.forEach(w => keywords.add(w));
  // Client words
  client.split(/[\s\-\/]+/).filter(w => w.length > 2).forEach(w => keywords.add(w));
  // Known abbreviations
  if (name.includes("avalonbay") || name.includes("avalon")) keywords.add("avb");
  if (name.includes("1520")) keywords.add("1520");
  if (name.includes("fowler")) keywords.add("fowler");
  if (name.includes("summit")) keywords.add("summit");
  if (name.includes("omb")) keywords.add("omb");
  if (name.includes("penske")) keywords.add("penske");
  if (name.includes("tega")) keywords.add("tega");
  if (name.includes("habitat")) keywords.add("habitat");
  return [...keywords];
}

function eventMatchesProject(eventTitle, project) {
  const title = eventTitle.toLowerCase();
  return getProjectKeywords(project).some(kw => title.includes(kw));
}

function getQaqcCheckpoints(cdDate) {
  if (!cdDate) return [];
  const shiftBack = (dateStr) => {
    const d = new Date(dateStr + "T00:00:00");
    const day = d.getDay();
    if (day === 0) d.setDate(d.getDate() - 2); // Sun → Fri
    if (day === 6) d.setDate(d.getDate() - 1); // Sat → Fri
    return d.toISOString().split("T")[0];
  };
  const offset = (days) => {
    const d = new Date(cdDate + "T00:00:00");
    d.setDate(d.getDate() - days);
    return shiftBack(d.toISOString().split("T")[0]);
  };
  const todayIso = new Date().toISOString().split("T")[0];
  return [
    { name: "Code Compliance Review", offset: "7 days before CDs", date: offset(7), status: "upcoming" },
    { name: "Consultant Coord + Internal QA/QC", offset: "5 days before CDs", date: offset(5), status: "upcoming" },
    { name: "Principal Review & Sign-off", offset: "1 day before CDs", date: offset(1), status: "upcoming" },
  ].map(cp => ({
    ...cp,
    status: cp.date < todayIso ? "complete"
      : cp.date === todayIso ? "in-progress"
      : "upcoming"
  }));
}

function ProgressRing({ progress, size = 48, stroke = 3.5, color }) {
  const radius = (size - stroke) / 2;
  const circ = 2 * Math.PI * radius;
  const offset = circ - (progress / 100) * circ;
  return (
    <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
      <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={stroke} />
      <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
        style={{ transition: "stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1)" }} />
      <text x={size/2} y={size/2} fill="white" fontSize="11" fontWeight="600" textAnchor="middle"
        dominantBaseline="central" style={{ transform: "rotate(90deg)", transformOrigin: "center" }}>
        {progress}%
      </text>
    </svg>
  );
}

function MiniProgressBar({ progress, color }) {
  return (
    <div style={{ width: "100%", height: "3px", background: "rgba(255,255,255,0.06)", borderRadius: "2px", overflow: "hidden" }}>

    </div>
  );
}

      ))}

  );

];

function calcOffset(cdDate, days) {
  if (!cdDate) return "";
  const d = new Date(cdDate + "T00:00:00");
  d.setDate(d.getDate() - days);
  return d.toISOString().split("T")[0];
}

function formatDateShort(dateStr) {
  if (!dateStr) return "—";
  return new Date(dateStr + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
}

                          <div style={{ fontSize: "10px", color: "rgba(255,255,255,0.2)" }}>{m.hint}</div>
                        </div>
                        {m.locked ? (
                          <div style={{ fontFamily: "'Space Mono', monospace", fontSize: "11px", color: "#E8C872",
                            padding: "7px 10px", background: "rgba(232,200,114,0.08)", borderRadius: "8px", flexShrink: 0 }}>
                            {formatDateShort(data.cdDate)}
                          </div>
                        ) : (
                          <input type="date" value={data.milestones[m.key]} onChange={e => updateMilestone(m.key, e.target.value)}
                            disabled={!enabled}
                            style={{ ...wizardInputStyle, width: "160px", fontSize: "12px", padding: "8px 10px", colorScheme: "dark",
                              opacity: enabled ? 1 : 0.3, pointerEvents: enabled ? "auto" : "none" }}
                            onFocus={e => e.currentTarget.style.borderColor = "rgba(232,200,114,0.4)"}
                            onBlur={e => e.currentTarget.style.borderColor = "rgba(255,255,255,0.1)"}
                          />
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}

          {/* ─── STEP 3: Consultants ─── */}
          {step === 3 && (
            <div style={{ display: "flex", flexDirection: "column", gap: "18px" }}>
              <div>
                <div style={{ fontSize: "16px", fontWeight: "600", color: "#FAFAF7", marginBottom: "4px" }}>
                  Consultant Coordination
                </div>
                <div style={{ fontSize: "12px", color: "rgba(255,255,255,0.35)", marginBottom: "16px" }}>
                  Select the disciplines on this project. Deadlines default to 1 week before 100% CDs — adjust as needed.
                </div>
              </div>

              <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
                {CONSULTANT_TYPES.map(c => {
                  const active = !!data.consultants[c.key];
                  return (
                    <div key={c.key}>
                      <Checkbox checked={active} onChange={() => toggleConsultant(c.key)}
                        label={c.label} sub={active ? "" : "Default: 7 days before 100% CDs"} />
                      {active && (
                        <div style={{
                          marginTop: "6px", marginLeft: "32px", padding: "10px 14px",
                          background: "rgba(255,255,255,0.015)", borderRadius: "10px",
                          border: "1px solid rgba(255,255,255,0.04)",
                          display: "flex", gap: "10px", alignItems: "center",
                        }}>
                          <div style={{ flex: 1 }}>
                            <label style={{ ...wizardLabelStyle, fontSize: "8px" }}>Deadline</label>
                            <input type="date" value={data.consultants[c.key]?.deadline || ""}
                              onChange={e => updateConsultant(c.key, "deadline", e.target.value)}
                              style={{ ...wizardInputStyle, fontSize: "12px", padding: "7px 10px", colorScheme: "dark" }}
                              onFocus={e => e.currentTarget.style.borderColor = "rgba(232,200,114,0.4)"}
                              onBlur={e => e.currentTarget.style.borderColor = "rgba(255,255,255,0.1)"}
                            />
                          </div>
                          <div style={{ flex: 1 }}>
                            <label style={{ ...wizardLabelStyle, fontSize: "8px" }}>Notes</label>
                            <input value={data.consultants[c.key]?.notes || ""}
                              onChange={e => updateConsultant(c.key, "notes", e.target.value)}
                              placeholder="Optional notes..."
                              style={{ ...wizardInputStyle, fontSize: "12px", padding: "7px 10px" }}
                              onFocus={e => e.currentTarget.style.borderColor = "rgba(232,200,114,0.4)"}
                              onBlur={e => e.currentTarget.style.borderColor = "rgba(255,255,255,0.1)"}
                            />
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* ─── STEP 4: QA/QC ─── */}
          {step === 4 && (
            <div style={{ display: "flex", flexDirection: "column", gap: "18px" }}>
              <div>
                <div style={{ fontSize: "16px", fontWeight: "600", color: "#FAFAF7", marginBottom: "4px" }}>
                  QA / QC Checkpoints
                </div>
                <div style={{ fontSize: "12px", color: "rgba(255,255,255,0.35)", marginBottom: "16px" }}>
                  Select the review gates you want to track. Proposed dates are based on your CD date — adjust any of them. You'll check these off manually once the project is created.
                </div>
              </div>

              <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
                {[
                  { key: "internalReview50", dateKey: "internalReview50Date", label: "Internal Review at 50% CDs", note: "Mid-process internal check" },
                  { key: "internalReview90", dateKey: "internalReview90Date", label: "Internal Review at 90% CDs", note: "Near-final set internal check" },
                  { key: "codeReview",       dateKey: "codeReviewDate",       label: "Code Compliance Review",    note: "Zoning, building code, and ADA verification" },
                  { key: "principalReview",  dateKey: "principalReviewDate",  label: "Principal Review & Sign-off", note: "Final quality gate before permit submission" },
                ].map(item => {
                  const enabled = data.qaqc[item.key];
                  return (
                    <div key={item.key} style={{
                      background: enabled ? "rgba(232,200,114,0.04)" : "rgba(255,255,255,0.015)",
                      border: `1px solid ${enabled ? "rgba(232,200,114,0.12)" : "rgba(255,255,255,0.04)"}`,
                      borderRadius: "12px", padding: "12px 14px", transition: "all 0.25s",
                    }}>
                      <div style={{ display: "flex", alignItems: "flex-start", gap: "12px" }}>
                        <div onClick={() => setData(prev => ({ ...prev, qaqc: { ...prev.qaqc, [item.key]: !prev.qaqc[item.key] } }))}
                          style={{ width: "20px", height: "20px", borderRadius: "6px", flexShrink: 0, marginTop: "2px", cursor: "pointer",
                            border: enabled ? "2px solid #E8C872" : "2px solid rgba(255,255,255,0.15)",
                            background: enabled ? "rgba(232,200,114,0.2)" : "transparent",
                            display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.2s" }}>
                          {enabled && <span style={{ color: "#E8C872", fontSize: "11px", fontWeight: "700" }}>✓</span>}
                        </div>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: "13px", fontWeight: "500", color: enabled ? "#FAFAF7" : "rgba(255,255,255,0.4)", transition: "color 0.2s" }}>{item.label}</div>
                          <div style={{ fontSize: "11px", color: "rgba(255,255,255,0.25)", marginTop: "1px" }}>{item.note}</div>
                        </div>
                        <div style={{ flexShrink: 0 }}>
                          <div style={{ fontFamily: "'Space Mono', monospace", fontSize: "8px", letterSpacing: "1px", color: "rgba(255,255,255,0.3)", textTransform: "uppercase", marginBottom: "4px" }}>Proposed Date</div>
                          <input type="date" value={data.qaqc[item.dateKey] || ""}
                            onChange={e => setData(prev => ({ ...prev, qaqc: { ...prev.qaqc, [item.dateKey]: e.target.value } }))}
                            disabled={!enabled}
                            style={{ ...wizardInputStyle, width: "150px", fontSize: "12px", padding: "7px 10px", colorScheme: "dark",
                              opacity: enabled ? 1 : 0.3, pointerEvents: enabled ? "auto" : "none" }}
                            onFocus={e => e.currentTarget.style.borderColor = "rgba(232,200,114,0.4)"}
                            onBlur={e => e.currentTarget.style.borderColor = "rgba(255,255,255,0.1)"}
                          />
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>

              <div style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.04)", borderRadius: "10px", padding: "12px 14px" }}>
                <div style={{ fontSize: "11px", color: "rgba(255,255,255,0.3)", lineHeight: "1.6" }}>
                  These items will appear on the project's Launch Checklist after creation. Block your calendar and check them off as you complete them.
                </div>
              </div>
            </div>
          )}

          {/* ─── STEP 5: Team & Launch Checklist ─── */}
          {step === 5 && (() => {
            const allActive = team.filter(m => m.active);
            const allSelected = allActive.length > 0 && allActive.every(m => data.teamMembers.includes(m.name));

            const saveNewMember = () => {
              if (!newMemberDraft.name?.trim()) return;
              const initials = newMemberDraft.name.trim().split(" ").map(w => w[0].toUpperCase()).join("").slice(0, 2);
              const newMember = { ...newMemberDraft, initials, id: Math.max(0, ...team.map(m => m.id)) + 1, active: true };
              if (onUpdateTeam) onUpdateTeam(prev => [...prev, newMember]);
              setData(prev => ({ ...prev, teamMembers: [...prev.teamMembers, newMemberDraft.name.trim()] }));
              setNewMemberDraft({ name: "", role: "Designer" });
              setAddingMember(false);
            };

            // Build action checklist items
            const checklistItems = [];
            if (data.qaqc.internalReview50) checklistItems.push({ id: "qaqc_50", text: "Block calendar: Internal Review at 50% CDs", date: data.qaqc.internalReview50Date, type: "qaqc" });
            if (data.qaqc.internalReview90) checklistItems.push({ id: "qaqc_90", text: "Block calendar: Internal Review at 90% CDs", date: data.qaqc.internalReview90Date, type: "qaqc" });
            if (data.qaqc.codeReview) checklistItems.push({ id: "qaqc_code", text: "Block calendar: Code Compliance Review", date: data.qaqc.codeReviewDate, type: "qaqc" });
            if (data.qaqc.principalReview) checklistItems.push({ id: "qaqc_principal", text: "Block calendar: Principal Review & Sign-off", date: data.qaqc.principalReviewDate, type: "qaqc" });
            if (data.teamMembers.length > 0) checklistItems.push({ id: "notify_team", text: `Send project intro to team: ${data.teamMembers.join(", ")}`, type: "action" });
            Object.keys(data.consultants).forEach(k => {
              const type = CONSULTANT_TYPES.find(c => c.key === k);
              const dl = data.consultants[k]?.deadline;
              checklistItems.push({ id: `consultant_${k}`, text: `Email ${type?.label} — confirm deadline${dl ? `: ${formatDateShort(dl)}` : ""}`, type: "action" });
            });
            checklistItems.push({ id: "kickoff", text: "Schedule project kickoff meeting with team", type: "action" });
            checklistItems.push({ id: "sharepoint", text: "Create SharePoint project folder", type: "action" });

            const doneCount = checklistItems.filter(i => checklistDone[i.id]).length;

            return (
              <div style={{ display: "flex", flexDirection: "column", gap: "20px" }}>
                <div>
                  <div style={{ fontSize: "16px", fontWeight: "600", color: "#FAFAF7", marginBottom: "4px" }}>Team & Launch Checklist</div>
                  <div style={{ fontSize: "12px", color: "rgba(255,255,255,0.35)" }}>Select everyone on this project, then review the launch checklist.</div>
                </div>

                {/* Full Team Directory */}
                <div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "10px" }}>
                    <label style={{ ...wizardLabelStyle, marginBottom: 0 }}>Project Team</label>
                    <button onClick={() => setData(prev => ({
                      ...prev, teamMembers: allSelected ? [] : allActive.map(m => m.name)
                    }))} style={{
                      background: "transparent", border: "none", cursor: "pointer",
                      fontFamily: "'Space Mono', monospace", fontSize: "8px", letterSpacing: "1px",
                      color: allSelected ? "#E8C872" : "rgba(255,255,255,0.3)", textTransform: "uppercase",
                    }}>{allSelected ? "Deselect All" : "Select All"}</button>
                  </div>

                  {/* Grouped by role */}
                  {ROLE_OPTIONS.map(role => {
                    const members = allActive.filter(m => m.role === role);
                    if (!members.length) return null;
                    return (
                      <div key={role} style={{ marginBottom: "10px" }}>
                        <div style={{ fontFamily: "'Space Mono', monospace", fontSize: "8px", letterSpacing: "2px",
                          color: roleColors[role] || "rgba(255,255,255,0.3)", textTransform: "uppercase", marginBottom: "6px" }}>
                          {role}s
                        </div>
                        <div style={{ display: "flex", flexWrap: "wrap", gap: "6px" }}>
                          {members.map(p => {
                            const isSelected = data.teamMembers.includes(p.name);
                            return (
                              <div key={p.id} onClick={() => toggleTeamMember(p.name)} style={{
                                padding: "6px 12px", borderRadius: "20px", cursor: "pointer",
                                fontSize: "12px", fontWeight: "500", display: "flex", alignItems: "center", gap: "6px",
                                background: isSelected ? `${roleColors[p.role] || "#aaa"}18` : "rgba(255,255,255,0.025)",
                                border: `1px solid ${isSelected ? (roleColors[p.role] || "#aaa") + "44" : "rgba(255,255,255,0.06)"}`,
                                color: isSelected ? (roleColors[p.role] || "#FAFAF7") : "rgba(255,255,255,0.4)",
                                transition: "all 0.2s",
                              }}>
                                <span style={{ fontFamily: "'Space Mono', monospace", fontSize: "9px", opacity: 0.7 }}>{p.initials}</span>
                                {p.name}
                                {isSelected && <span style={{ fontSize: "10px" }}>✓</span>}
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })}

                  {/* Add new member inline */}
                  {addingMember ? (
                    <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: "12px", padding: "12px", display: "flex", gap: "8px", flexWrap: "wrap", alignItems: "flex-end", marginTop: "6px" }}>
                      <div style={{ flex: 2, minWidth: "120px" }}>
                        <div style={{ ...wizardLabelStyle, fontSize: "8px" }}>Name</div>
                        <input value={newMemberDraft.name} onChange={e => setNewMemberDraft(prev => ({ ...prev, name: e.target.value }))}
                          placeholder="Full name" style={{ ...wizardInputStyle, fontSize: "12px", padding: "7px 10px" }}
                          onFocus={e => e.currentTarget.style.borderColor = "rgba(232,200,114,0.4)"}
                          onBlur={e => e.currentTarget.style.borderColor = "rgba(255,255,255,0.1)"}
                        />
                      </div>
                      <div style={{ flex: 1, minWidth: "100px" }}>
                        <div style={{ ...wizardLabelStyle, fontSize: "8px" }}>Role</div>
                        <select value={newMemberDraft.role} onChange={e => setNewMemberDraft(prev => ({ ...prev, role: e.target.value }))}
                          style={{ ...wizardInputStyle, fontSize: "12px", padding: "7px 10px" }}>
                          {ROLE_OPTIONS.map(r => <option key={r} value={r}>{r}</option>)}
                        </select>
                      </div>
                      <div style={{ display: "flex", gap: "6px" }}>
                        <button onClick={saveNewMember} style={{ background: "rgba(232,200,114,0.15)", border: "1px solid rgba(232,200,114,0.3)", borderRadius: "8px", padding: "7px 14px", color: "#E8C872", cursor: "pointer", fontSize: "12px", fontWeight: "600" }}>Add</button>
                        <button onClick={() => { setAddingMember(false); setNewMemberDraft({ name: "", role: "Designer" }); }} style={{ background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: "8px", padding: "7px 12px", color: "rgba(255,255,255,0.4)", cursor: "pointer", fontSize: "12px" }}>Cancel</button>
                      </div>
                    </div>
                  ) : (
                    <button onClick={() => setAddingMember(true)} style={{
                      background: "rgba(255,255,255,0.025)", border: "1px dashed rgba(255,255,255,0.1)",
                      borderRadius: "10px", padding: "8px 14px", color: "rgba(255,255,255,0.3)", cursor: "pointer",
                      fontFamily: "'Space Mono', monospace", fontSize: "9px", letterSpacing: "1px", textTransform: "uppercase",
                      transition: "all 0.2s", width: "100%", marginTop: "6px",
                    }}
                      onMouseEnter={e => { e.currentTarget.style.borderColor = "rgba(255,255,255,0.2)"; e.currentTarget.style.color = "rgba(255,255,255,0.5)"; }}
                      onMouseLeave={e => { e.currentTarget.style.borderColor = "rgba(255,255,255,0.1)"; e.currentTarget.style.color = "rgba(255,255,255,0.3)"; }}
                    >+ Add New Team Member</button>
                  )}
                </div>

                {/* Launch Checklist */}
                <div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "10px" }}>
                    <label style={{ ...wizardLabelStyle, marginBottom: 0 }}>Launch Checklist</label>
                    <div style={{ fontFamily: "'Space Mono', monospace", fontSize: "9px", color: doneCount === checklistItems.length ? "#4ADE80" : "rgba(255,255,255,0.25)", letterSpacing: "1px" }}>
                      {doneCount} / {checklistItems.length} done
                    </div>
                  </div>
                  <div style={{ background: "rgba(255,255,255,0.015)", border: "1px solid rgba(255,255,255,0.05)", borderRadius: "12px", overflow: "hidden" }}>
                    {checklistItems.map((item, i) => {
                      const done = checklistDone[item.id];
                      return (
                        <div key={item.id} onClick={() => setChecklistDone(prev => ({ ...prev, [item.id]: !prev[item.id] }))} style={{
                          display: "flex", alignItems: "center", gap: "12px", padding: "11px 14px", cursor: "pointer",
                          borderBottom: i < checklistItems.length - 1 ? "1px solid rgba(255,255,255,0.04)" : "none",
                          background: done ? "rgba(74,222,128,0.03)" : "transparent", transition: "background 0.2s",
                        }}
                          onMouseEnter={e => !done && (e.currentTarget.style.background = "rgba(255,255,255,0.025)")}
                          onMouseLeave={e => !done && (e.currentTarget.style.background = "transparent")}
                        >
                          <div style={{ width: "18px", height: "18px", borderRadius: "5px", flexShrink: 0,
                            border: done ? "2px solid #4ADE80" : item.type === "qaqc" ? "2px solid rgba(114,184,232,0.4)" : "2px solid rgba(255,255,255,0.15)",
                            background: done ? "rgba(74,222,128,0.15)" : "transparent",
                            display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.2s" }}>
                            {done && <span style={{ color: "#4ADE80", fontSize: "10px", fontWeight: "700" }}>✓</span>}
                          </div>
                          <div style={{ flex: 1 }}>
                            <div style={{ fontSize: "12px", color: done ? "rgba(255,255,255,0.3)" : "rgba(255,255,255,0.75)", textDecoration: done ? "line-through" : "none", transition: "all 0.2s" }}>{item.text}</div>
                            {item.date && !done && <div style={{ fontFamily: "'Space Mono', monospace", fontSize: "9px", color: item.type === "qaqc" ? "#72B8E8" : "rgba(255,255,255,0.25)", marginTop: "2px" }}>{formatDateShort(item.date)}</div>}
                          </div>
                          {item.type === "qaqc" && !done && <div style={{ fontFamily: "'Space Mono', monospace", fontSize: "7px", letterSpacing: "1px", color: "rgba(114,184,232,0.5)", textTransform: "uppercase", flexShrink: 0 }}>QA/QC</div>}
                        </div>
                      );
                    })}
                  </div>
                  <div style={{ fontSize: "11px", color: "rgba(255,255,255,0.2)", marginTop: "8px" }}>
                    These save to the project card. Check them off as you go.
                  </div>
                </div>
              </div>
            );
          })()}

          {/* ─── STEP 6: Review ─── */}
          {step === 6 && (
            <div style={{ display: "flex", flexDirection: "column", gap: "16px" }}>
              <div style={{ fontSize: "16px", fontWeight: "600", color: "#FAFAF7", marginBottom: "4px" }}>
                Review & Create
              </div>

              {/* Project Summary Card */}
              <div style={{
                background: "rgba(232,200,114,0.04)", border: "1px solid rgba(232,200,114,0.12)",
                borderRadius: "14px", padding: "18px", display: "flex", flexDirection: "column", gap: "14px",
              }}>
                <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
                  <span style={{ fontSize: "28px" }}>{data.icon}</span>
                  <div>
                    <div style={{ fontSize: "18px", fontWeight: "600", color: "#FAFAF7" }}>{data.name}</div>
                    <div style={{ fontSize: "13px", color: "rgba(255,255,255,0.4)" }}>{data.client}</div>
                  </div>
                </div>

                <div style={{ height: "1px", background: "rgba(255,255,255,0.06)" }} />

                {[
                  { label: "Phase", value: data.phase },
                  { label: "100% CD Date", value: formatDateShort(data.cdDate) },
                  { label: "Team", value: data.teamMembers.join(", ") || "None assigned" },
                ].map(row => (
                  <div key={row.label} style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span style={{ ...wizardLabelStyle, marginBottom: 0 }}>{row.label}</span>
                    <span style={{ fontSize: "13px", fontWeight: "500", color: "#FAFAF7", textAlign: "right", maxWidth: "60%" }}>{row.value}</span>
                  </div>
                ))}

                {Object.keys(data.consultants).length > 0 && (
                  <>
                    <div style={{ height: "1px", background: "rgba(255,255,255,0.06)" }} />
                    <div>
                      <div style={{ ...wizardLabelStyle, marginBottom: "8px" }}>Consultants</div>
                      {Object.entries(data.consultants).map(([key, val]) => {
                        const type = CONSULTANT_TYPES.find(c => c.key === key);
                        return (
                          <div key={key} style={{ display: "flex", justifyContent: "space-between", padding: "4px 0" }}>
                            <span style={{ fontSize: "12px", color: "rgba(255,255,255,0.6)" }}>{type?.label}</span>
                            <span style={{ fontFamily: "'Space Mono', monospace", fontSize: "11px", color: "rgba(255,255,255,0.4)" }}>{formatDateShort(val.deadline)}</span>
                          </div>
                        );
                      })}
                    </div>
                  </>
                )}

                <div style={{ height: "1px", background: "rgba(255,255,255,0.06)" }} />
                <div>
                  <div style={{ ...wizardLabelStyle, marginBottom: "8px" }}>QA / QC</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: "6px" }}>
                    {data.qaqc.internalReview50 && <span style={{ fontSize: "11px", padding: "4px 10px", borderRadius: "6px", background: "rgba(74,222,128,0.1)", color: "#4ADE80" }}>50% Review{data.qaqc.internalReview50Date ? ` · ${formatDateShort(data.qaqc.internalReview50Date)}` : ""}</span>}
                    {data.qaqc.internalReview90 && <span style={{ fontSize: "11px", padding: "4px 10px", borderRadius: "6px", background: "rgba(74,222,128,0.1)", color: "#4ADE80" }}>90% Review{data.qaqc.internalReview90Date ? ` · ${formatDateShort(data.qaqc.internalReview90Date)}` : ""}</span>}
                    {data.qaqc.codeReview && <span style={{ fontSize: "11px", padding: "4px 10px", borderRadius: "6px", background: "rgba(114,184,232,0.1)", color: "#72B8E8" }}>Code Compliance{data.qaqc.codeReviewDate ? ` · ${formatDateShort(data.qaqc.codeReviewDate)}` : ""}</span>}
                    {data.qaqc.principalReview && <span style={{ fontSize: "11px", padding: "4px 10px", borderRadius: "6px", background: "rgba(232,200,114,0.1)", color: "#E8C872" }}>Principal Sign-off{data.qaqc.principalReviewDate ? ` · ${formatDateShort(data.qaqc.principalReviewDate)}` : ""}</span>}
                  </div>
                </div>

                <div style={{ height: "1px", background: "rgba(255,255,255,0.06)" }} />
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <span style={{ ...wizardLabelStyle, marginBottom: 0 }}>Launch Checklist</span>
                  <span style={{ fontSize: "12px", color: "rgba(255,255,255,0.4)" }}>Saves to project card after creation</span>
                </div>
              </div>
            </div>
          )}
        </div>

        {/* Footer Nav */}
        <div style={{
          padding: "16px 28px", borderTop: "1px solid rgba(255,255,255,0.06)",
          display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0,
          background: "rgba(0,0,0,0.15)",
        }}>
          <button onClick={() => step > 1 ? setStep(step - 1) : onClose()} style={{
            background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)",
            borderRadius: "10px", padding: "10px 20px", color: "rgba(255,255,255,0.5)",
            cursor: "pointer", fontSize: "13px", fontWeight: "500", transition: "all 0.2s",
          }}
            onMouseEnter={e => { e.currentTarget.style.background = "rgba(255,255,255,0.08)"; e.currentTarget.style.color = "#FAFAF7"; }}
            onMouseLeave={e => { e.currentTarget.style.background = "rgba(255,255,255,0.04)"; e.currentTarget.style.color = "rgba(255,255,255,0.5)"; }}
          >{step > 1 ? "← Back" : "Cancel"}</button>

          <div style={{ fontFamily: "'Space Mono', monospace", fontSize: "11px", color: "rgba(255,255,255,0.25)" }}>
            {step} of {WIZARD_STEPS.length}
          </div>

          <button onClick={() => {
            if (step < 6) setStep(step + 1);
            else handleComplete();
          }}
            disabled={!canProceed()}
            style={{
              background: step === 6 ? "rgba(232,200,114,0.2)" : "rgba(232,200,114,0.1)",
              border: `1px solid ${step === 6 ? "rgba(232,200,114,0.5)" : "rgba(232,200,114,0.25)"}`,
              borderRadius: "10px", padding: "10px 24px",
              color: canProceed() ? "#E8C872" : "rgba(232,200,114,0.3)",
              cursor: canProceed() ? "pointer" : "not-allowed",
              fontSize: "13px", fontWeight: "600", transition: "all 0.2s",
              opacity: canProceed() ? 1 : 0.5,
            }}
            onMouseEnter={e => { if (canProceed()) e.currentTarget.style.background = step === 6 ? "rgba(232,200,114,0.3)" : "rgba(232,200,114,0.18)"; }}
            onMouseLeave={e => { e.currentTarget.style.background = step === 6 ? "rgba(232,200,114,0.2)" : "rgba(232,200,114,0.1)"; }}
          >{step === 6 ? "Create Project ✓" : "Next →"}</button>
        </div>
      </div>
    </>
  );
}

// ═══════ MAIN DASHBOARD ═══════
function Dashboard() {
  const [selectedProject, setSelectedProject] = useState(null);
  const [todos, setTodos] = useState(MUST_DO_TODAY);
  const [time, setTime] = useState(new Date());
  const [loaded, setLoaded] = useState(false);
  const [wizardOpen, setWizardOpen] = useState(false);
  const [teamPanelOpen, setTeamPanelOpen] = useState(false);
  const [projects, setProjects] = useState(PROJECTS);
  const [team, setTeam] = useState(INITIAL_TEAM);
  const [consultants, setConsultants] = useState(INITIAL_CONSULTANTS);
  const [justCreated, setJustCreated] = useState(null);
  const [newTaskText, setNewTaskText] = useState("");
  const [editingProjectTeam, setEditingProjectTeam] = useState(false);
  const [confirmDeleteId, setConfirmDeleteId] = useState(null);
  const [newTaskHot, setNewTaskHot] = useState(false);
  const [storageReady, setStorageReady] = useState(false);
  const [calendarEvents, setCalendarEvents] = useState([]);
  const [calendarLoading, setCalendarLoading] = useState(false);
  const [calendarError, setCalendarError] = useState(null);
  const [calendarLastFetched, setCalendarLastFetched] = useState(null);
  const [calSyncLoading, setCalSyncLoading] = useState(false);
  const [calSyncSuggestions, setCalSyncSuggestions] = useState([]);
  const [calSyncProjectId, setCalSyncProjectId] = useState(null);
  const [caDeliverablesExpanded, setCaDeliverablesExpanded] = useState({});
  const [caAddingType, setCaAddingType] = useState(null);
  const [caAddDraft, setCaAddDraft] = useState({ subject: "", dueDate: "" });
  const [caConfirmProjectId, setCaConfirmProjectId] = useState(null);
  const [revertConfirmProjectId, setRevertConfirmProjectId] = useState(null);
  const [editingDeliverable, setEditingDeliverable] = useState(null); // { projectId, index }
  const [deliverableDraft, setDeliverableDraft] = useState({ name: "", due: "", notes: "" });
  const [dragProjectId, setDragProjectId] = useState(null);
  const [dragOverProjectId, setDragOverProjectId] = useState(null);
  const [archivedHotTasks, setArchivedHotTasks] = useState([]);
  const [showArchive, setShowArchive] = useState(false);
  const [issuesBarExpanded, setIssuesBarExpanded] = useState(false);
  const [addingIssueForProject, setAddingIssueForProject] = useState(null);
  const [issueDraft, setIssueDraft] = useState({ title: "", description: "", priority: "normal", dueDate: "" });
  const [archivedIssues, setArchivedIssues] = useState([]);

  // ── Google Calendar live fetch ──
  const fetchCalendarEvents = useCallback(async () => {
    setCalendarLoading(true);
    setCalendarError(null);
    try {
      const today = new Date();
      const end = new Date();
      end.setDate(today.getDate() + 60);
      const todayISO = new Date(today.toISOString().split("T")[0] + "T00:00:00").toISOString();
      const endISO = end.toISOString();

      const response = await fetch("/api/anthropic", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 4000,
          system: `You are a calendar data extractor. Use the Google Calendar tool to list events from ALL available calendars for the time range provided. Then return ONLY a valid JSON array — no markdown fences, no explanation. Each element must follow this exact shape:
{"date":"YYYY-MM-DD","title":"Event Title","time":"H:MM AM","type":"meeting"}

Rules:
- date: YYYY-MM-DD string derived from the event start
- time: "H:MM AM" or "H:MM PM" for timed events, or "All Day" for all-day events
- type: one of "meeting" | "deadline" | "review" | "site" | "milestone" — infer from the title:
  "review", "approval", "finishes review", "finish review" → "review"
  "deadline", "due", "upload", "submit", "100%", "permit", "plan review", "staffing spreadsheet" → "deadline"
  "site visit", "walk", "inspection", "build", "habitat", "sopralluogo" → "site"
  "milestone", "OAC", "cd due", "launch", "fc vs", "sports" → "milestone"
  all others → "meeting"
Return ONLY the JSON array. Nothing before it, nothing after it.`,
          messages: [{ role: "user", content: `Fetch all calendar events from ${todayISO} to ${endISO} from ALL available calendars and return them as the JSON array described in your instructions.` }],
          mcp_servers: [{ type: "url", url: "https://gcal.mcp.claude.com/mcp", name: "gcal" }],
        }),
      });

      const data = await response.json();
      const textBlocks = (data.content || []).filter(b => b.type === "text");
      const fullText = textBlocks.map(b => b.text).join("");
      const jsonMatch = fullText.match(/\[[\s\S]*\]/);
      if (jsonMatch) {
        const events = JSON.parse(jsonMatch[0]);
        const cleaned = events.filter(e => e.date && e.title);
        setCalendarEvents(cleaned);
        setCalendarLastFetched(Date.now());
        try {
          localStorage.setItem("dashboard:gcal_events", JSON.stringify(cleaned));
          localStorage.setItem("dashboard:gcal_fetched_at", String(Date.now()));
        } catch (_) {}
      } else {
        throw new Error("No JSON array in response");
      }
    } catch (err) {
      console.error("Calendar fetch error:", err);
      setCalendarError("Could not load live calendar");
    } finally {
      setCalendarLoading(false);
    }
  }, []);

  // ── Per-project calendar sync ──
  const fetchProjectCalendarEvents = useCallback(async (project) => {
    setCalSyncLoading(true);
    setCalSyncSuggestions([]);
    setCalSyncProjectId(project.id);
    try {
      const today = new Date();
      const end = new Date();
      end.setDate(today.getDate() + 180);
      const existingDues = new Set((project.deliverables || []).map(d => d.due));
      const response = await fetch("/api/anthropic", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 3000,
          system: `You are a calendar event extractor for an architecture firm project manager. 
Search ALL available Google Calendars for events related to the project: "${project.name}".
Also look for abbreviations or partial names (e.g. "AVB" for AvalonBay, "Summit" for Summit Farms, "1520" for 1520 South Blvd, "Fowler", "OMB").
Return ONLY a valid JSON array — no markdown, no explanation. Each item:
{"id":"unique_string","title":"Suggested Deliverable Name","date":"YYYY-MM-DD","originalTitle":"Original Calendar Event Title","type":"milestone|deadline|review|meeting"}

Rules:
- Include ONLY events that look like project milestones, deadlines, reviews, or OAC meetings
- Do NOT include routine recurring weekly meetings unless they appear to be a key review
- title should be a clean deliverable label (e.g. "OAC Meeting", "Finishes Review", "100% CD Due")
- date must be YYYY-MM-DD
- Return empty array [] if nothing relevant is found`,
          messages: [{ role: "user", content: `Find all calendar events from ${today.toISOString()} to ${end.toISOString()} that relate to the project "${project.name}". Return the JSON array.` }],
          mcp_servers: [{ type: "url", url: "https://gcal.mcp.claude.com/mcp", name: "gcal" }],
        }),
      });
      const data = await response.json();
      const textBlocks = (data.content || []).filter(b => b.type === "text");
      const fullText = textBlocks.map(b => b.text).join("");
      const jsonMatch = fullText.match(/\[[\s\S]*\]/);
      if (jsonMatch) {
        const raw = JSON.parse(jsonMatch[0]);
        // Filter out dates already in deliverables
        const suggestions = raw
          .filter(e => e.date && e.title && !existingDues.has(e.date))
          .map(e => ({ ...e, accepted: false, declined: false }));
        setCalSyncSuggestions(suggestions);
      } else {
        setCalSyncSuggestions([]);
      }
    } catch (err) {
      console.error("Project cal sync error:", err);
      setCalSyncSuggestions([]);
    } finally {
      setCalSyncLoading(false);
    }
  }, []);

  const acceptSuggestion = (suggId) => {
    const sugg = calSyncSuggestions.find(s => s.id === suggId);
    if (!sugg || !calSyncProjectId) return;
    const newDeliverable = { name: sugg.title, due: sugg.date, status: sugg.date < new Date().toISOString().split("T")[0] ? "complete" : "upcoming", fromCalendar: true };
    setProjects(prev => prev.map(p => {
      if (p.id !== calSyncProjectId) return p;
      const merged = [...(p.deliverables || []), newDeliverable].sort((a, b) => a.due < b.due ? -1 : 1);
      return { ...p, deliverables: merged };
    }));
    setCalSyncSuggestions(prev => prev.map(s => s.id === suggId ? { ...s, accepted: true } : s));
  };

  const declineSuggestion = (suggId) => {
    setCalSyncSuggestions(prev => prev.map(s => s.id === suggId ? { ...s, declined: true } : s));
  };

  const enterCaPhase = (projectId) => {
    setProjects(prev => prev.map(p => p.id === projectId
      ? { ...p, previousPhase: p.phase, phase: "Construction Admin", status: "on-track", caItems: p.caItems || [] }
      : p
    ));
    setCaConfirmProjectId(null);
  };

  const revertToDesignPhase = (projectId) => {
    setProjects(prev => prev.map(p => p.id === projectId
      ? { ...p, phase: p.previousPhase || "Construction Documents", previousPhase: null }
      : p
    ));
    setRevertConfirmProjectId(null);
  };

  const addCaItem = (projectId, type) => {
    if (!caAddDraft.subject.trim()) return;
    setProjects(prev => prev.map(p => {
      if (p.id !== projectId) return p;
      const existing = (p.caItems || []).filter(i => i.type === type);
      const num = existing.length + 1;
      const newItem = {
        id: `${type}_${Date.now()}`,
        type,
        num,
        subject: caAddDraft.subject.trim(),
        dueDate: caAddDraft.dueDate || "",
        status: type === "site" ? "complete" : type === "punch" ? "open" : "open",
        date: new Date().toISOString().split("T")[0],
      };
      return { ...p, caItems: [...(p.caItems || []), newItem] };
    }));
    setCaAddDraft({ subject: "", dueDate: "" });
    setCaAddingType(null);
  };

  const updateCaItemStatus = (projectId, itemId, newStatus) => {
    setProjects(prev => prev.map(p => p.id !== projectId ? p : {
      ...p,
      caItems: (p.caItems || []).map(i => i.id === itemId ? { ...i, status: newStatus } : i),
    }));
  };

  const saveDeliverableEdit = () => {
    if (!editingDeliverable) return;
    const { projectId, index } = editingDeliverable;
    setProjects(prev => prev.map(p => {
      if (p.id !== projectId) return p;
      const updated = (p.deliverables || []).map((d, i) =>
        i === index ? { ...d, name: deliverableDraft.name, due: deliverableDraft.due, notes: deliverableDraft.notes } : d
      );
      return { ...p, deliverables: updated };
    }));
    setEditingDeliverable(null);
  };


  useEffect(() => {
    async function loadData() {
      try {
        const storedProjects = localStorage.getItem("dashboard:projects");
        if (storedProjects) {
          const parsed = JSON.parse(storedProjects);
          // Normalize all IDs to strings and deduplicate
          const seenIds = new Set();
          const cleaned = parsed.map(p => {
            let id = String(p.id);
            // Convert bare numeric IDs to proj_ format
            if (/^\d+$/.test(id)) id = "proj_migrated_" + id;
            // If still a duplicate, generate a fresh unique ID
            while (seenIds.has(id)) {
              id = "proj_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 6);
            }
            seenIds.add(id);
            return { ...p, id };
          });
          setProjects(cleaned);
        }
      } catch (_) {}
      try {
        const storedTodos = localStorage.getItem("dashboard:todos");
        if (storedTodos) setTodos(JSON.parse(storedTodos));
      } catch (_) {}
      try {
        const storedTeam = localStorage.getItem("dashboard:team");
        if (storedTeam) {
          const parsed = JSON.parse(storedTeam);
          const storedIds = new Set(parsed.map(m => m.id));
          const merged = [...parsed, ...INITIAL_TEAM.filter(m => !storedIds.has(m.id))];
          setTeam(merged);
        }
      } catch (_) {}
      try {
        const storedConsultants = localStorage.getItem("dashboard:consultants");
        if (storedConsultants) setConsultants(JSON.parse(storedConsultants));
      } catch (_) {}

      // Load cached calendar events (auto-fetch disabled on hosted version)
      try {
        const cachedEvents = localStorage.getItem("dashboard:gcal_events");
        const cachedAt = localStorage.getItem("dashboard:gcal_fetched_at");
        if (cachedEvents && cachedAt) {
          setCalendarEvents(JSON.parse(cachedEvents));
          setCalendarLastFetched(parseInt(cachedAt, 10));
        }
      } catch (_) {}

      try {
        const storedArchivedIssues = localStorage.getItem("dashboard:archived_issues");
        if (storedArchivedIssues) setArchivedIssues(JSON.parse(storedArchivedIssues));
      } catch (_) {}

      setStorageReady(true);
      setLoaded(true);
    }
    loadData();
    const interval = setInterval(() => setTime(new Date()), 30000);
    return () => clearInterval(interval);
  }, []);

  // Persist projects whenever they change (after initial load)
  useEffect(() => {
    if (!storageReady) return;
    try { localStorage.setItem("dashboard:projects", JSON.stringify(projects)); } catch (_) {}
  }, [projects, storageReady]);

  // Persist todos whenever they change (after initial load)
  useEffect(() => {
    if (!storageReady) return;
    try { localStorage.setItem("dashboard:todos", JSON.stringify(todos)); } catch (_) {}
  }, [todos, storageReady]);

  // Persist team whenever it changes
  useEffect(() => {
    if (!storageReady) return;
    try { localStorage.setItem("dashboard:team", JSON.stringify(team)); } catch (_) {}
  }, [team, storageReady]);

  // Persist consultants whenever they change
  useEffect(() => {
    if (!storageReady) return;
    try { localStorage.setItem("dashboard:consultants", JSON.stringify(consultants)); } catch (_) {}
  }, [consultants, storageReady]);

  // Persist archived issues
  useEffect(() => {
    if (!storageReady) return;
    try { localStorage.setItem("dashboard:archived_issues", JSON.stringify(archivedIssues)); } catch (_) {}
  }, [archivedIssues, storageReady]);

  const updateProjectField = (projectId, updates) => {
    setProjects(prev => prev.map(p => p.id === projectId ? { ...p, ...updates } : p));
  };

  const handleNewProject = (data) => {
    // Build launch checklist from QA/QC items + action items
    const checklistItems = [];
    if (data.qaqc.internalReview50) checklistItems.push({ id: "qaqc_50", text: "Block calendar: Internal Review at 50% CDs", date: data.qaqc.internalReview50Date, type: "qaqc", done: !!data.checklistDone?.qaqc_50 });
    if (data.qaqc.internalReview90) checklistItems.push({ id: "qaqc_90", text: "Block calendar: Internal Review at 90% CDs", date: data.qaqc.internalReview90Date, type: "qaqc", done: !!data.checklistDone?.qaqc_90 });
    if (data.qaqc.codeReview) checklistItems.push({ id: "qaqc_code", text: "Block calendar: Code Compliance Review", date: data.qaqc.codeReviewDate, type: "qaqc", done: !!data.checklistDone?.qaqc_code });
    if (data.qaqc.principalReview) checklistItems.push({ id: "qaqc_principal", text: "Block calendar: Principal Review & Sign-off", date: data.qaqc.principalReviewDate, type: "qaqc", done: !!data.checklistDone?.qaqc_principal });
    if (data.teamMembers.length > 0) checklistItems.push({ id: "notify_team", text: `Send project intro to team: ${data.teamMembers.join(", ")}`, type: "action", done: !!data.checklistDone?.notify_team });
    Object.keys(data.consultants || {}).forEach(k => {
      const type = CONSULTANT_TYPES.find(c => c.key === k);
      const dl = data.consultants[k]?.deadline;
      checklistItems.push({ id: `consultant_${k}`, text: `Email ${type?.label} — confirm deadline${dl ? `: ${formatDateShort(dl)}` : ""}`, type: "action", done: !!data.checklistDone?.[`consultant_${k}`] });
    });
    checklistItems.push({ id: "kickoff", text: "Schedule project kickoff meeting with team", type: "action", done: !!data.checklistDone?.kickoff });
    checklistItems.push({ id: "sharepoint", text: "Create SharePoint project folder", type: "action", done: !!data.checklistDone?.sharepoint });

    const enabledMilestones = [
      ...(data.milestoneEnabled?.sd && data.milestones.sd ? [{ name: "SD Complete", due: data.milestones.sd, status: "upcoming" }] : []),
      ...(data.milestoneEnabled?.dd && data.milestones.dd ? [{ name: "DD Complete", due: data.milestones.dd, status: "upcoming" }] : []),
      ...(data.milestoneEnabled?.cd50 && data.milestones.cd50 ? [{ name: "50% CD Review", due: data.milestones.cd50, status: "upcoming" }] : []),
      ...(data.milestoneEnabled?.cd90 && data.milestones.cd90 ? [{ name: "90% CD Review", due: data.milestones.cd90, status: "upcoming" }] : []),
      { name: "100% CDs", due: data.cdDate, status: "upcoming" },
      ...(data.milestoneEnabled?.permit && data.milestones.permit ? [{ name: "Permit Submission", due: data.milestones.permit, status: "upcoming" }] : []),
    ];
    const firstMilestone = enabledMilestones.find(m => m.name !== "100% CDs") || enabledMilestones[0];

    const newProject = {
      id: "proj_" + Date.now().toString(36),
      name: data.name,
      client: data.client,
      phase: data.phase,
      progress: 0,
      cdDate: data.cdDate,
      nextMilestone: firstMilestone?.name || "100% CDs",
      nextMilestoneDate: firstMilestone?.due || data.cdDate,
      status: "on-track",
      team: data.teamMembers.filter(Boolean).map(n => n.split(" ").map(w => w[0]).join("")),
      recentActivity: "Project created",
      icon: data.icon,
      deliverables: enabledMilestones,
      launchChecklist: checklistItems,
    };
    setProjects(prev => [...prev, newProject]);
    setWizardOpen(false);
    setJustCreated(newProject.id);
    setSelectedProject(newProject.id);
    setTimeout(() => setJustCreated(null), 3000);
  };

  const toggleTodo = (id) => {
    const todo = todos.find(t => t.id === id);
    if (!todo) return;
    if (todo.hot && !todo.done) {
      // Archive hot tasks instead of leaving them in the list
      setArchivedHotTasks(prev => [...prev, { ...todo, done: true, completedAt: Date.now() }]);
      setTodos(prev => prev.filter(t => t.id !== id));
    } else {
      setTodos(prev => prev.map(t => t.id === id ? { ...t, done: !t.done } : t));
    }
  };

  const addTask = () => {
    if (!newTaskText.trim()) return;
    const newId = Math.max(0, ...todos.map(t => t.id)) + 1;
    setTodos(prev => [...prev, { id: newId, text: newTaskText.trim(), project: "", done: false, hot: newTaskHot }]);
    setNewTaskText("");
    setNewTaskHot(false);
  };

  const toggleHot = (id) => {
    setTodos(prev => prev.map(t => t.id === id ? { ...t, hot: !t.hot } : t));
  };

  const removeTask = (id) => {
    setTodos(prev => prev.filter(t => t.id !== id));
  };

  // ── Issue management ──
  const addIssue = (projectId) => {
    if (!issueDraft.title.trim()) return;
    const newIssue = {
      id: "iss_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 5),
      title: issueDraft.title.trim(),
      description: issueDraft.description.trim(),
      priority: issueDraft.priority,
      dueDate: issueDraft.dueDate,
      done: false,
      createdAt: Date.now(),
    };
    setProjects(prev => prev.map(p => p.id === projectId
      ? { ...p, issues: [...(p.issues || []), newIssue] }
      : p
    ));
    setIssueDraft({ title: "", description: "", priority: "normal", dueDate: "" });
    setAddingIssueForProject(null);
  };

  const toggleIssue = (projectId, issueId) => {
    const project = projects.find(p => p.id === projectId);
    if (!project) return;
    const issue = (project.issues || []).find(i => i.id === issueId);
    if (!issue) return;
    if (issue.priority === "hot" && !issue.done) {
      setArchivedIssues(prev => [...prev, { ...issue, projectId, projectName: project.name, done: true, completedAt: Date.now() }]);
      setProjects(prev => prev.map(p => p.id === projectId
        ? { ...p, issues: (p.issues || []).filter(i => i.id !== issueId) }
        : p
      ));
    } else {
      setProjects(prev => prev.map(p => p.id === projectId
        ? { ...p, issues: (p.issues || []).map(i => i.id === issueId ? { ...i, done: !i.done } : i) }
        : p
      ));
    }
  };

  const removeIssue = (projectId, issueId) => {
    setProjects(prev => prev.map(p => p.id === projectId
      ? { ...p, issues: (p.issues || []).filter(i => i.id !== issueId) }
      : p
    ));
  };

  const allOpenIssues = projects.flatMap(p =>
    (p.issues || []).filter(i => !i.done).map(i => ({ ...i, projectId: p.id, projectName: p.name, projectIcon: p.icon }))
  );
  const hotIssueCount = allOpenIssues.filter(i => i.priority === "hot").length;
  const totalOpenIssueCount = allOpenIssues.length;

  const issuePriorityColors = { hot: "#F87171", normal: "#FBBF24", low: "rgba(255,255,255,0.3)" };
  const issuePriorityLabels = { hot: "HOT", normal: "NORMAL", low: "LOW" };

  // Auto-purge archived hot tasks older than 7 days
  useEffect(() => {
    const sevenDaysAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;
    setArchivedHotTasks(prev => prev.filter(t => t.completedAt > sevenDaysAgo));
    setArchivedIssues(prev => prev.filter(i => i.completedAt > sevenDaysAgo));
  }, []);

  const weekDays = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
  const today = new Date();
